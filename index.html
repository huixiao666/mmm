<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>全能协议 → Sing-Box (1.11.4模板)</title>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            background: #f5f7fc;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 20px 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1e293b;
        }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; flex: 1; }
        h1 {
            font-size: 2rem; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(145deg, #2563eb, #8b5cf6);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; letter-spacing: -0.02em;
        }
        .subtitle {
            color: #64748b; margin-bottom: 24px; font-size: 1rem;
            border-left: 4px solid #3b82f6; padding-left: 16px;
        }
        .card {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.08);
            padding: 24px 22px; margin-bottom: 22px;
        }
        .input-area { display: flex; flex-direction: column; gap: 16px; }
        label {
            font-weight: 600; font-size: 0.95rem; color: #334155;
            display: flex; align-items: center; gap: 6px;
        }
        textarea {
            width: 100%; padding: 18px; font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.9rem; background: #fff; border: 1.5px solid #e2e8f0;
            border-radius: 20px; min-height: 160px; color: #0f172a; resize: vertical;
            transition: 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.15); }
        .button-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
        .btn {
            background: white; border: 1px solid #cbd5e1; padding: 12px 26px;
            border-radius: 60px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.2s; display: inline-flex;
            align-items: center; gap: 8px; background: rgba(255,255,255,0.9);
        }
        .btn-primary { background: #1e293b; border-color: #1e293b; color: white; }
        .btn-primary:hover { background: #0f172a; transform: translateY(-1px); }
        .btn-success { background: #10b981; border-color: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-outline:hover { background: #f8fafc; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .badge { background: #e2e8f0; padding: 5px 14px; border-radius: 30px; font-size: 0.8rem; }
        pre {
            background: #0b1120; color: #e4e7ee; padding: 20px; border-radius: 18px;
            overflow-x: auto; font-size: 0.8rem; font-family: 'SF Mono', monospace;
            max-height: 500px; white-space: pre-wrap; word-break: break-all;
            border: 1px solid #334155;
        }
        .footnote { margin-top: 20px; color: #64748b; font-size: 0.85rem; text-align: center; }
        .example-btn { background: none; border: 1px dashed #94a3b8; padding: 6px 15px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; }
        .example-btn:hover { background: #eef2ff; border-color: #3b82f6; }
        .toast-msg { color: #059669; font-weight: 500; margin-left: 12px; }
        .protocol-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
        .tag { background: #e2e8f0; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧬 多协议 → Sing-Box (1.11.4模板)</h1>
    <div class="subtitle">VLESS · VMess · Trojan · SS · Hysteria2 · 自动去重 · 适配1.11.4模板</div>

    <div class="card">
        <div class="input-area">
            <label>📥 粘贴节点链接 (每行一个，支持混合协议)</label>
            <textarea id="inputArea" placeholder="例如:&#10;vless://...&#10;vmess://...&#10;trojan://...&#10;ss://...&#10;hysteria2://..."></textarea>
            <div class="protocol-tags">
                <span class="tag">✅ VLESS</span>
                <span class="tag">✅ VMess</span>
                <span class="tag">✅ Trojan</span>
                <span class="tag">✅ Shadowsocks</span>
                <span class="tag">✅ Hysteria2</span>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" id="convertBtn">✨ 解析并生成配置</button>
                <button class="btn btn-outline" id="clearBtn">🧹 清空</button>
                
            </div>
        </div>
    </div>

    <div class="card">
        <div class="output-header">
            <label>📦 Sing-Box 配置 (可直接复制)</label>
            <div style="display: flex; gap: 10px;">
                <span class="badge" id="nodeCountBadge">0 个节点</span>
                <button class="btn btn-success" id="copyBtn">📋 一键复制</button>
            </div>
        </div>
        <pre id="outputConfig">// 点击「解析并生成配置」后显示完整 JSON …</pre>
        <div id="copyFeedback" style="height: 24px; margin-top: 8px;"></div>
    </div>
    <div class="footnote">
        ⚡ 基于 1.11.4.txt 模板 · 节点注入 proxy/auto 组 · 标签自动去重 · 严格兼容
    </div>
</div>
<script>
    (function(){
        "use strict";

        // ---------- 基础模板 (源自 1.11.4.txt，已移除硬编码节点) ----------
        const BASE_TEMPLATE = {
            "log": { "level": "info", "timestamp": true },
            "dns": {
                "servers": [
                    { "tag": "dns-resolver", "address": "223.5.5.5", "detour": "direct" },
                    { "tag": "dns-direct", "address": "https://dns.alidns.com/dns-query", "address_resolver": "dns-resolver", "detour": "direct" },
                    { "tag": "dns-proxy", "address": "https://1.1.1.1/dns-query", "address_resolver": "dns-resolver", "detour": "proxy" },
                    { "tag": "dns-block", "address": "rcode://success" }
                ],
                "rules": [
                    { "rule_set": ["geosite-category-ads-all"], "server": "dns-block", "disable_cache": true },
                    { "domain_suffix": ["raw.githubusercontent.com"], "server": "dns-direct" },
                    { "domain_suffix": [".cn"], "server": "dns-direct" },
                    { "rule_set": "geosite-cn", "server": "dns-direct" },
                    { "rule_set": ["geosite-geolocation-!cn"], "server": "dns-proxy" }
                ],
                "final": "dns-proxy",
                "independent_cache": true
            },
            "ntp": { "enabled": true, "interval": "30m", "server": "ntp.aliyun.com", "server_port": 123 },
            "inbounds": [
                { "type": "mixed", "tag": "mixed-in", "listen": "127.0.0.1", "listen_port": 7890, "set_system_proxy": false },
                { "type": "tun", "tag": "tun-in", "mtu": 1500, "address": ["172.19.0.1/30", "fdfe:dcba:9876::1/126"], "auto_route": true, "strict_route": true, "stack": "gvisor", "endpoint_independent_nat": true }
            ],
            "outbounds": [
                { "type": "direct", "tag": "direct" },
                {
                    "type": "selector", "tag": "proxy",
                    "outbounds": ["auto"],   // 动态填充
                    "default": "auto"
                },
                {
                    "type": "urltest", "tag": "auto",
                    "outbounds": [],   // 动态填充
                    "url": "https://www.gstatic.com/generate_204",
                    "interval": "3m",
                    "tolerance": 50
                }
            ],
            "route": {
                "rule_set": [
                    { "type": "remote", "tag": "geoip-cn", "format": "binary", "url": "https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-cn.srs", "download_detour": "direct", "update_interval": "24h" },
                    { "type": "remote", "tag": "geosite-cn", "format": "binary", "url": "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-cn.srs", "download_detour": "direct", "update_interval": "24h" },
                    { "type": "remote", "tag": "geosite-geolocation-!cn", "format": "binary", "url": "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-geolocation-!cn.srs", "download_detour": "direct", "update_interval": "24h" },
                    { "type": "remote", "tag": "geosite-category-ads-all", "format": "binary", "url": "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-category-ads-all.srs", "download_detour": "direct", "update_interval": "24h" }
                ],
                "rules": [
                    { "action": "sniff" },
                    { "protocol": "dns", "action": "hijack-dns" },
                    { "ip_is_private": true, "outbound": "direct" },
                    { "domain_suffix": ["raw.githubusercontent.com"], "outbound": "direct" },
                    { "rule_set": ["geosite-category-ads-all"], "action": "reject" },
                    { "rule_set": ["geosite-cn", "geoip-cn"], "outbound": "direct" },
                    { "domain_suffix": [".cn"], "outbound": "direct" },
                    { "rule_set": "geosite-geolocation-!cn", "outbound": "proxy" }
                ],
                "final": "proxy",
                "auto_detect_interface": true
            },
            "experimental": {
                "cache_file": { "enabled": true, "path": "sing-box-cache.db", "store_rdrc": true },
                "clash_api": {
                    "external_controller": "127.0.0.1:9090",
                    "external_ui": "ui",
                    "external_ui_download_url": "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip",
                    "external_ui_download_detour": "direct"
                }
            }
        };

        // ---------- 辅助：唯一标签 (自动去重) ----------
        function makeUniqueTag(baseName, usedTags) {
            let candidate = baseName;
            if (!candidate) candidate = 'node';
            candidate = candidate.replace(/[^\w\u4e00-\u9fa5\-_.]/g, '_').substring(0, 30);
            if (!candidate) candidate = 'node';
            let finalTag = candidate;
            let counter = 1;
            while (usedTags.has(finalTag)) {
                finalTag = `${candidate}-${counter}`;
                counter++;
            }
            usedTags.add(finalTag);
            return finalTag;
        }

        // ---------- 协议解析器 (同前，略作调整) ----------
        function parseVless(url) {
            let main = url.substring(8);
            let fragment = '';
            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            const qIdx = main.indexOf('?');
            let serverPart = main, query = '';
            if (qIdx !== -1) { serverPart = main.substring(0,qIdx); query = main.substring(qIdx+1); }
            const at = serverPart.indexOf('@');
            if (at === -1) throw new Error('Invalid VLESS');
            const uuid = serverPart.substring(0, at);
            const hostPort = serverPart.substring(at+1);
            let server, port;
            const col = hostPort.lastIndexOf(':');
            if (col !== -1) { server = hostPort.substring(0,col); port = parseInt(hostPort.substring(col+1)); }
            else { server = hostPort; port = 443; }
            const params = new URLSearchParams(query);
            const type = params.get('type') || 'tcp';
            const security = params.get('security') || 'none';
            const flow = params.get('flow') || '';
            const sni = params.get('sni') || params.get('peer') || server;
            const alpn = params.get('alpn');
            const fp = params.get('fp') || (security==='tls'?'chrome':undefined);
            let path = params.get('path') || '/'; try { path = decodeURIComponent(path); } catch(e){}
            const host = params.get('host') || sni;
            const serviceName = params.get('serviceName') || '';
            const pbk = params.get('pbk') || '';
            const sid = params.get('sid') || '';
            
            const rawTag = fragment || `${server}:${port}`;
            const node = {
                _rawTag: rawTag,
                type: 'vless',
                server,
                server_port: port,
                uuid
            };
            if (flow) node.flow = flow;
            if (type !== 'tcp') {
                const transport = { type };
                if (type === 'ws') { transport.path = path; if (host) transport.headers = { Host: host }; }
                else if (type === 'grpc') transport.service_name = serviceName;
                else if (type === 'httpupgrade') { transport.path = path; if (host) transport.host = host; }
                node.transport = transport;
            }
            if (security === 'tls') {
                node.tls = { enabled: true, server_name: sni, insecure: false };
                if (alpn) node.tls.alpn = alpn.split(',').map(s=>s.trim());
                if (fp) node.tls.utls = { enabled: true, fingerprint: fp };
            } else if (security === 'reality') {
                node.tls = { enabled: true, server_name: sni, reality: { enabled: true }, insecure: false };
                if (pbk) node.tls.reality.public_key = pbk;
                if (sid) node.tls.reality.short_id = sid;
                if (fp) node.tls.utls = { enabled: true, fingerprint: fp };
            }
            return node;
        }

        function parseVmess(url) {
            const b64 = url.substring(8);
            const jsonStr = atob(b64);
            const vm = JSON.parse(jsonStr);
            const rawTag = vm.ps || `${vm.add}:${vm.port}`;
            const node = {
                _rawTag: rawTag,
                type: 'vmess',
                server: vm.add,
                server_port: parseInt(vm.port) || 443,
                uuid: vm.id,
                security: vm.scy || 'auto',
                alter_id: parseInt(vm.aid) || 0
            };
            const net = vm.net;
            if (net && net !== 'tcp') {
                const transport = { type: net };
                if (net === 'ws') {
                    transport.path = vm.path || '/';
                    if (vm.host) transport.headers = { Host: vm.host };
                } else if (net === 'grpc') {
                    transport.service_name = vm.path || '';
                } else if (net === 'h2') {
                    transport.type = 'http';
                    transport.host = vm.host ? [vm.host] : undefined;
                    transport.path = vm.path;
                }
                node.transport = transport;
            }
            if (vm.tls === 'tls') {
                node.tls = { enabled: true, server_name: vm.sni || vm.add, insecure: false };
                if (vm.alpn) node.tls.alpn = vm.alpn.split(',');
                if (vm.fingerprint) node.tls.utls = { enabled: true, fingerprint: vm.fingerprint };
            }
            return node;
        }

        function parseTrojan(url) {
            let main = url.substring(9);
            let fragment = '';
            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            const at = main.indexOf('@');
            if (at === -1) throw new Error('Invalid Trojan');
            const password = main.substring(0, at);
            const hostPort = main.substring(at+1);
            const qm = hostPort.indexOf('?');
            let server, port, query='';
            if (qm !== -1) {
                const hp = hostPort.substring(0, qm);
                query = hostPort.substring(qm+1);
                const col = hp.lastIndexOf(':');
                if (col !== -1) { server = hp.substring(0,col); port = parseInt(hp.substring(col+1)); }
                else { server = hp; port = 443; }
            } else {
                const col = hostPort.lastIndexOf(':');
                if (col !== -1) { server = hostPort.substring(0,col); port = parseInt(hostPort.substring(col+1)); }
                else { server = hostPort; port = 443; }
            }
            const params = new URLSearchParams(query);
            const sni = params.get('sni') || server;
            const fp = params.get('fp') || 'chrome';
            const alpn = params.get('alpn');
            const type = params.get('type') || 'tcp';
            const path = params.get('path') || '/';
            const host = params.get('host') || sni;
            
            const rawTag = fragment || `${server}:${port}`;
            const node = {
                _rawTag: rawTag,
                type: 'trojan',
                server,
                server_port: port,
                password
            };
            if (type !== 'tcp') {
                const transport = { type };
                if (type === 'ws') { transport.path = path; if (host) transport.headers = { Host: host }; }
                node.transport = transport;
            }
            node.tls = { enabled: true, server_name: sni, insecure: false };
            if (alpn) node.tls.alpn = alpn.split(',');
            if (fp) node.tls.utls = { enabled: true, fingerprint: fp };
            return node;
        }

        function parseShadowsocks(url) {
            let main = url.substring(5);
            let fragment = '';
            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            let method, password, server, port;
            if (main.includes('@')) {
                const at = main.lastIndexOf('@');
                const userInfo = main.substring(0, at);
                const hostPort = main.substring(at+1);
                const decoded = atob(userInfo);
                const colon = decoded.indexOf(':');
                method = decoded.substring(0, colon);
                password = decoded.substring(colon+1);
                const col = hostPort.lastIndexOf(':');
                server = col!==-1 ? hostPort.substring(0,col) : hostPort;
                port = col!==-1 ? parseInt(hostPort.substring(col+1)) : 8388;
            } else {
                const decoded = atob(main);
                const parts = decoded.split('@');
                const mp = parts[0].split(':');
                method = mp[0];
                password = mp[1];
                const hp = parts[1].split(':');
                server = hp[0];
                port = parseInt(hp[1]);
            }
            const rawTag = fragment || `${server}:${port}`;
            return {
                _rawTag: rawTag,
                type: 'shadowsocks',
                server,
                server_port: port,
                method,
                password
            };
        }

        function parseHysteria2(url) {
            let u = url.startsWith('hysteria2://') ? url : url.replace('hy2://', 'hysteria2://');
            let main = u.substring(12);
            let fragment = '';
            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            const at = main.indexOf('@');
            if (at === -1) throw new Error('Invalid Hysteria2');
            const password = main.substring(0, at);
            const hostPort = main.substring(at+1);
            const qm = hostPort.indexOf('?');
            let server, port, query='';
            if (qm !== -1) {
                const hp = hostPort.substring(0, qm);
                query = hostPort.substring(qm+1);
                const col = hp.lastIndexOf(':');
                if (col !== -1) { server = hp.substring(0,col); port = parseInt(hp.substring(col+1)); }
                else { server = hp; port = 443; }
            } else {
                const col = hostPort.lastIndexOf(':');
                if (col !== -1) { server = hostPort.substring(0,col); port = parseInt(hostPort.substring(col+1)); }
                else { server = hostPort; port = 443; }
            }
            const params = new URLSearchParams(query);
            const sni = params.get('sni') || server;
            const insecure = params.get('insecure') === '1';
            const obfs = params.get('obfs');
            const obfsPassword = params.get('obfs-password');
            
            const rawTag = fragment || `${server}:${port}`;
            const node = {
                _rawTag: rawTag,
                type: 'hysteria2',
                server,
                server_port: port,
                password,
                tls: { enabled: true, server_name: sni, insecure }
            };
            if (obfs) {
                node.obfs = { type: obfs };
                if (obfsPassword) node.obfs.password = obfsPassword;
            }
            return node;
        }

        function parseLine(line) {
            line = line.trim();
            if (!line) return null;
            try {
                if (line.startsWith('vless://')) return parseVless(line);
                if (line.startsWith('vmess://')) return parseVmess(line);
                if (line.startsWith('trojan://')) return parseTrojan(line);
                if (line.startsWith('ss://')) return parseShadowsocks(line);
                if (line.startsWith('hysteria2://') || line.startsWith('hy2://')) return parseHysteria2(line);
            } catch (e) {
                console.warn('解析失败:', line, e);
                return null;
            }
            return null;
        }

        // ---------- 核心：将节点注入模板 ----------
        function injectNodesIntoTemplate(rawNodes) {
            // 深拷贝模板
            const config = JSON.parse(JSON.stringify(BASE_TEMPLATE));
            
            // 收集已用标签 (模板中的固定 outbounds)
            const usedTags = new Set();
            config.outbounds.forEach(ob => usedTags.add(ob.tag));
            
            // 为每个节点分配唯一 tag
            const finalNodes = [];
            for (let raw of rawNodes) {
                const baseTag = raw._rawTag || 'node';
                delete raw._rawTag;
                const uniqueTag = makeUniqueTag(baseTag, usedTags);
                raw.tag = uniqueTag;
                finalNodes.push(raw);
            }
            
            // 找到 direct 的索引 (节点将插入其后)
            const directIndex = config.outbounds.findIndex(ob => ob.tag === 'direct');
            if (directIndex === -1) throw new Error('模板缺少 direct 出站');
            
            // 将节点插入到 direct 之后
            config.outbounds.splice(directIndex + 1, 0, ...finalNodes);
            
            // 获取所有节点标签 (用于填充 auto 和 proxy)
            const nodeTags = finalNodes.map(n => n.tag);
            
            // 更新 auto (urltest) 的 outbounds
            const autoObj = config.outbounds.find(ob => ob.tag === 'auto');
            if (autoObj) autoObj.outbounds = nodeTags;
            
            // 更新 proxy (selector) 的 outbounds (保留 auto 并加入节点)
            const proxyObj = config.outbounds.find(ob => ob.tag === 'proxy');
            if (proxyObj) {
                proxyObj.outbounds = ['auto', ...nodeTags];
            }
            
            return { config, nodeCount: finalNodes.length };
        }

        // ---------- UI ----------
        const inputArea = document.getElementById('inputArea');
        const outputPre = document.getElementById('outputConfig');
        const nodeBadge = document.getElementById('nodeCountBadge');
        const feedbackDiv = document.getElementById('copyFeedback');
        
        function showFeedback(msg) {
            feedbackDiv.innerHTML = `<span class="toast-msg">${msg}</span>`;
            setTimeout(() => feedbackDiv.innerHTML = '', 2500);
        }

        document.getElementById('convertBtn').addEventListener('click', () => {
            try {
                const raw = inputArea.value.trim();
                if (!raw) throw new Error('请输入节点链接');
                const lines = raw.split(/\n/);
                const rawNodes = [];
                for (let line of lines) {
                    const node = parseLine(line);
                    if (node) rawNodes.push(node);
                }
                if (rawNodes.length === 0) throw new Error('未识别到有效节点');
                
                const { config, nodeCount } = injectNodesIntoTemplate(rawNodes);
                outputPre.textContent = JSON.stringify(config, null, 2);
                nodeBadge.textContent = `${nodeCount} 个节点`;
                showFeedback(`✅ 成功解析 ${nodeCount} 个节点`);
            } catch (e) {
                alert('转换失败: ' + e.message);
                outputPre.textContent = '// 解析错误';
                nodeBadge.textContent = '0 个节点';
            }
        });

        document.getElementById('copyBtn').addEventListener('click', async () => {
